<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Lista de Tareas</h1>

    <form id="task-form" class="task-form">
      <div class="task-row">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="Agregar una tarea..."
          required
          autocomplete="off"
        >
        <button type="submit" class="btn btn-add">Agregar</button>
      </div>

      <div class="task-row task-extra-row">
        <select id="task-category" class="task-select">
          <option value="">Categoría</option>
          <option value="study">Estudio</option>
          <option value="work">Trabajo</option>
          <option value="personal">Personal</option>
          <option value="gaming">Gaming</option>
        </select>

        <select id="task-priority" class="task-select">
          <option value="">Prioridad</option>
          <option value="baja">Baja</option>
          <option value="media">Media</option>
          <option value="alta">Alta</option>
        </select>

        <input type="date" id="task-date" class="task-date">
      </div>
    </form>

    <div id="filter-bar" class="filter-bar">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="completed">Completadas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
    </div>

    <p id="empty-msg" class="empty-msg">No hay tareas. ¡Agrega una!</p>

    <ul id="task-list" class="task-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
